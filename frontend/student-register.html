<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | AI Classroom Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .audio-preview {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 243, 255, 0.1);
            border-radius: 8px;
            display: none;
        }
        .audio-preview.show {
            display: block;
        }
        .audio-preview audio {
            width: 100%;
            margin-top: 5px;
        }
        .file-info {
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-top: 5px;
        }
        .recording-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-recording {
            padding: 8px 15px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .btn-record {
            background: linear-gradient(135deg, #00ff88, #00cc66);
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--neon-cyan); margin-bottom: 1rem;"></i>
                <h2>Student Registration</h2>
                <p>Join the AI-powered classroom</p>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="student-register-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" name="rollNumber" required placeholder="CS2024001">
                </div>
                
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" name="department" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="student@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Minimum 6 characters">
                </div>
                
                <div class="form-group">
                    <label>Voice Sample (for voice recognition)</label>
                    <div class="file-input-wrapper">
                        <div class="file-label" onclick="document.getElementById('voiceSample').click()">
                            <i class="fas fa-microphone"></i>
                            <span id="file-label-text">Choose audio file (MP3/WAV)</span>
                        </div>
                        <input type="file" id="voiceSample" name="voiceSample" accept="audio/*" style="display: none;" onchange="handleAudioFile(this)">
                    </div>
                    <div id="audioPreview" class="audio-preview">
                        <i class="fas fa-music"></i> Selected file: <span id="fileName"></span>
                        <span class="file-info" id="fileSize"></span>
                        <audio id="audioPlayer" controls></audio>
                    </div>
                    <div class="recording-controls">
                        <button type="button" class="btn-record btn-glow" onclick="startRecording()" style="padding: 5px 10px; font-size: 0.8rem;">
                            <i class="fas fa-circle"></i> Record Voice
                        </button>
                        <button type="button" class="btn-recording" onclick="stopRecording()" style="display: none; padding: 5px 10px; font-size: 0.8rem;" id="stopRecordBtn">
                            <i class="fas fa-stop"></i> Stop Recording
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="auth-btn" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="student-login.html">Login here</a></p>
                <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        
        // Handle audio file selection
        function handleAudioFile(input) {
            const file = input.files[0];
            if (file) {
                const fileName = file.name;
                const fileSize = (file.size / 1024 / 1024).toFixed(2);
                
                document.getElementById('file-label-text').textContent = fileName;
                document.getElementById('fileName').textContent = fileName;
                document.getElementById('fileSize').textContent = `${fileSize} MB`;
                
                // Preview audio
                const audioPlayer = document.getElementById('audioPlayer');
                const audioUrl = URL.createObjectURL(file);
                audioPlayer.src = audioUrl;
                
                document.getElementById('audioPreview').classList.add('show');
            }
        }
        
        // Start recording voice
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioFile = new File([audioBlob], 'voice_recording.wav', { type: 'audio/wav' });
                    
                    // Create file input and set file
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(audioFile);
                    document.getElementById('voiceSample').files = dataTransfer.files;
                    
                    // Trigger change event
                    handleAudioFile({ files: [audioFile] });
                    
                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                    
                    document.querySelector('.btn-record').style.display = 'inline-flex';
                    document.getElementById('stopRecordBtn').style.display = 'none';
                };
                
                mediaRecorder.start();
                document.querySelector('.btn-record').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'inline-flex';
                
            } catch (err) {
                console.error('Error accessing microphone:', err);
                showAlert('Please allow microphone access to record voice', 'error');
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }
        
        // Show alert
        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alert');
            if (alertDiv) {
                alertDiv.textContent = message;
                alertDiv.className = `alert alert-${type} show`;
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                }, 5000);
            }
        }
        
        // Handle form submission
        document.getElementById('student-register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            // Validation
            const name = document.getElementById('name').value;
            const rollNumber = document.getElementById('rollNumber').value;
            const department = document.getElementById('department').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const voiceSample = document.getElementById('voiceSample').files[0];
            
            if (!name || !rollNumber || !department || !email || !password) {
                showAlert('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!voiceSample) {
                showAlert('Please upload a voice sample', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('name', name);
            formData.append('rollNumber', rollNumber);
            formData.append('department', department);
            formData.append('email', email);
            formData.append('password', password);
            formData.append('voiceSample', voiceSample);
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Registering...';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register/student', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'student-login.html';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
